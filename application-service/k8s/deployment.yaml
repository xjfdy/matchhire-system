apiVersion: apps/v1
kind: Deployment
metadata:
  name: application-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: application-service
  template:
    metadata:
      labels:
        app: application-service
    spec:
      containers:
        - name: application-service
          image: application-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://host.minikube.internal:5002/application-service-db
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: host.minikube.internal:9094
            - name: GRPC_CLIENT_JOB_SERVICE_ADDRESS
              value: static://job-service:9091