syntax = "proto3";

option java_package =
"com.matchhire.jobservice.grpc";
option java_outer_classname = "JobProto";
option java_multiple_files = true;

service JobGrpcService {
  rpc GetJobById (JobRequest) returns (JobResponse);
}

message JobRequest {
  string id = 1;
}

message JobResponse {
  string id = 1;
  string employerId = 2;
  string title = 3;
}